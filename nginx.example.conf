server {
	server_name wallet.viz.world www.wallet.viz.world;
	listen 80;
	root  /var/www/wallet.viz.world;
	index index.html index.php;
	access_log  /var/www/logs/nginx_access_wallet.viz.world.log;
	error_log  /var/www/logs/nginx_error_wallet.viz.world.log;

	# Сжатие статики (app.js ~318KB, viz.min.js ~451KB, ltmp_* ~100KB каждый).
	# gzip есть в nginx из коробки; brotli — если собран модуль ngx_brotli (лучше сжатие).
	gzip on;
	gzip_vary on;
	gzip_comp_level 6;
	gzip_min_length 1024;
	gzip_proxied any;
	gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;
	# brotli on;
	# brotli_comp_level 6;
	# brotli_types text/plain text/css application/javascript application/json image/svg+xml application/xml;

	if (!-f $request_filename){
	set $rule_0 1$rule_0;
	}
	if (!-d $request_filename){
	set $rule_0 2$rule_0;
	}
	if ($rule_0 = "21"){
	rewrite ^/(.*)$ /index.php?$1;
	}
	rewrite ^/$ /index.php;

	location ~ \.(php)$ {
		fastcgi_param SCRIPT_FILENAME $document_root/$fastcgi_script_name;
		fastcgi_param PATH_INFO $fastcgi_script_name;

		fastcgi_connect_timeout 60;
		fastcgi_send_timeout 60;
		fastcgi_read_timeout 60;
		fastcgi_buffer_size 128k;
		fastcgi_buffers 4 256k;
		fastcgi_busy_buffers_size 256k;
		fastcgi_temp_file_write_size 256k;
		fastcgi_intercept_errors on;

		include fastcgi_params;
		client_max_body_size       10m;
		client_body_buffer_size    128k;
		expires off;
		proxy_set_header   Host      $host;
		proxy_set_header   X-Real-IP    $remote_addr;
		proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
		fastcgi_pass unix:/run/php/php7.3-fpm.sock;
	}
	location / {
		proxy_redirect off;
		client_max_body_size       10m;
		client_body_buffer_size    128k;
		proxy_connect_timeout      90;
		proxy_send_timeout       90;
		proxy_read_timeout       90;
		proxy_buffer_size         1024k;
		proxy_buffers         8 5120k;
		proxy_busy_buffers_size    10240k;
		proxy_temp_file_write_size 10240k;
		proxy_set_header   Host      $host;
		proxy_set_header   X-Real-IP    $remote_addr;
		proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
		expires off;
	}
}